version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trainer_app
      POSTGRES_PASSWORD: trainer_app_pass
      POSTGRES_DB: trainer_app_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trainer_app_test
      POSTGRES_PASSWORD: trainer_app_test_pass
      POSTGRES_DB: trainer_app_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

  # Dev email catcher — SMTP on :1025, web inbox UI on http://localhost:8025
  # Run the API with EMAIL_PROVIDER=smtp SMTP_HOST=localhost SMTP_PORT=1025 to see emails.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
