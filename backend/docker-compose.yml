version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trainer_app
      POSTGRES_PASSWORD: trainer_app_pass
      POSTGRES_DB: trainer_app_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trainer_app_test
      POSTGRES_PASSWORD: trainer_app_test_pass
      POSTGRES_DB: trainer_app_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
